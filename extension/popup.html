<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <style>
    body { width: 300px; font-family: system-ui, sans-serif; padding: 14px; margin: 0; }
    h1 { font-size: 16px; margin: 0 0 8px; }
    p { font-size: 12px; color: #5f6368; margin: 0 0 10px; line-height: 1.45; }
    a { color: #1a73e8; font-size: 12px; }
  </style>
</head>
<body>
  <h1>🛡️ CheckEverything</h1>
  <p>Click <strong>Trust Score</strong> on any ChatGPT response. Code blocks use 5-agent review; text answers use preliminary credibility analysis.</p>
  <a href="#" id="options">Configure API URL</a>
  <script>
    document.getElementById("options").onclick = (e) => {
      e.preventDefault();
      chrome.runtime.openOptionsPage();
    };
  </script>
</body>
</html>
